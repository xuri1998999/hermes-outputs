<style>
  :root {
    --xhs-red: #FF2442;
    --xhs-red-soft: #FFE5EA;
    --bg: #FFF8F0;
    --ink: #1f1f1f;
    --muted: #888;
    --card-bg: #ffffff;
    --shadow: 0 4px 20px rgba(0,0,0,0.06);

  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; line-height: 1.6; -webkit-font-smoothing: antialiased; }
  header { text-align: center; padding: 48px 24px 24px; }

  .wall { max-width: 1200px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  @media (max-width: 900px) { .wall { grid-template-columns: 1fr; } }
  .card { background: var(--card-bg); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: transform .25s ease, box-shadow .25s ease; display: flex; flex-direction: column; }
  .card:hover { transform: translateY(-6px); box-shadow: var(--shadow-hover); }
  .card .cover { position: relative; width: 100%; aspect-ratio: 3 / 4; overflow: hidden; background: var(--xhs-red-soft); }
  .card .cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card .cover .badge { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.55); color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 11px; backdrop-filter: blur(4px); }
  .card .body { padding: 16px 18px 20px; flex: 1; display: flex; flex-direction: column; }
  .card .body h2 { font-size: 16px; font-weight: 700; line-height: 1.4; margin-bottom: 10px; color: var(--ink); }
  .card .body .excerpt { font-size: 13px; color: #555; line-height: 1.65; flex: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card .body .tags { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
  .card .body .tags span { font-size: 11px; color: var(--xhs-red); background: var(--xhs-red-soft); padding: 3px 8px; border-radius: 10px; }
  /* Modal */
  .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 50; padding: 24px; }
  .modal-mask.open { display: flex; }
  .modal { background: #fff; border-radius: 16px; width: 100%; max-width: 880px; max-height: 92vh; overflow-y: auto; display: grid; grid-template-columns: 5fr 6fr; }
  @media (max-width: 720px) { .modal { grid-template-columns: 1fr; } }
  .modal .carousel { position: relative; background: #000; aspect-ratio: 3 / 4; overflow: hidden; }
  .modal .carousel img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .modal .carousel button { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.85); border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
  .modal .carousel .prev { left: 12px; }
  .modal .carousel .next { right: 12px; }
  .modal .carousel .dots { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
  .modal .carousel .dots span { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.5); }
  .modal .carousel .dots span.active { background: #fff; }
  .modal .content { padding: 28px 28px 24px; display: flex; flex-direction: column; }
  .modal .content h2 { font-size: 20px; font-weight: 800; margin-bottom: 14px; line-height: 1.4; }
  .modal .content pre { white-space: pre-wrap; word-wrap: break-word; font-family: inherit; font-size: 14px; line-height: 1.85; color: #2a2a2a; flex: 1; }
  .modal .close { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.9); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 20px; z-index: 2; }
  footer { text-align: center; padding: 32px 24px 48px; color: var(--muted); font-size: 12px; }
  footer .watermark { display: inline-block; background: #fff; padding: 6px 14px; border-radius: 14px; box-shadow: var(--shadow); color: var(--xhs-red); font-weight: 600; }

const wall = document.getElementById('wall');
posts.forEach((p, idx) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => openModal(idx);
  card.innerHTML = `
    <div class="cover">
      <img src="${p.images[0]}" alt="${p.title}" loading="lazy" onerror="this.style.opacity=0.3">
      <span class="badge">${p.badge}</span>
    </div>
    <div class="body">
      <h2>${p.title}</h2>
      <div class="excerpt">${p.excerpt}</div>
      <div class="tags">${p.tags.map(t=>`<span>${t}</span>`).join('')}</div>
    </div>`;
  wall.appendChild(card);
});

let cur = 0, curImg = 0;
function openModal(i) {
  cur = i; curImg = 0;
  document.getElementById('mTitle').textContent = posts[i].title;
  document.getElementById('mBody').textContent = posts[i].body;
  renderCarousel();
  document.getElementById('mask').classList.add('open');
}
function closeModal() { document.getElementById('mask').classList.remove('open'); }
function renderCarousel() {
  const imgs = posts[cur].images;
  document.getElementById('carouselImg').src = imgs[curImg];
  const dots = document.getElementById('dots');
  dots.innerHTML = imgs.map((_,i)=>`<span class="${i===curImg?'active':''}"></span>`).join('');
}
function navCarousel(dir) {
  const len = posts[cur].images.length;
  curImg = (curImg + dir + len) % len;
  renderCarousel();
}
document.getElementById('mask').addEventListener('click', e => {
  if (e.target.id === 'mask') closeModal();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('mask').classList.contains('open')) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft') navCarousel(-1);
  if (e.key === 'ArrowRight') navCarousel(1);
});
</script>
